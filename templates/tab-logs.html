<div style="display:flex; flex-direction:column; height:100%; overflow-y:auto; padding:15px; box-sizing:border-box; gap:10px;">
    <!-- 日志 (合并真实调用与4个模块模拟调用) -->
    <div style="display:flex; align-items:center; gap:8px; background:transparent; padding:8px 12px; border-radius:4px; border:1px solid var(--SmartThemeBorderColor); flex-wrap:wrap; justify-content:space-between; width:100%; box-sizing:border-box;">
        <div style="display:flex; align-items:center; gap:6px; flex:1; min-width:180px;">
            <span style="font-size:0.85em; color:var(--SmartThemeBodyColor); white-space:nowrap;">日志模块:</span>
            <select id="plot-log-module-select" class="plot-select" style="width:100%; font-size:0.85em; height:28px; padding:0 4px;">
                <option value="real">最新一次真实 API 调用</option>
                <option value="variables">变量模块模拟调用</option>
                <option value="goals">目标判定模拟调用</option>
                <option value="goals_ai_gen">目标生成模拟调用</option>
                <option value="storyline">故事线模块模拟调用</option>
                <option value="backstage">幕后模块模拟调用</option>
            </select>
        </div>
        <button id="plot-logs-refresh-logs-btn" class="menu_button plot-btn" style="padding:4px 10px; font-size:0.9em; flex-shrink:0;" title="刷新日志">
            <i class="fa-solid fa-arrows-rotate"></i> 刷新
        </button>
    </div>

    <div id="plot-logs-logs-content" style="display:flex; flex-direction:column; gap:10px;">
        <!-- Rendered dynamically by JS -->
    </div>
</div>
