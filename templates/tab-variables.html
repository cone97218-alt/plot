<div class="plot-panel-wrapper" style="position: relative; height: 100%; display: flex; flex-direction: column;">
    <!-- 1. Header (Mode Select & Settings Gear) -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid var(--SmartThemeBorderColor); padding-bottom: 8px; flex-shrink: 0; gap: 10px;">
        <span style="font-weight: bold; font-size: 0.95em; color: var(--SmartThemeEmColor); display: flex; align-items: center; gap: 6px;">
            <i class="fa-solid fa-sliders"></i> 变量与世界状态
        </span>
        
        <!-- Right: Mode Dropdown & Config Icon -->
        <div style="display: flex; gap: 6px; align-items: center; justify-content: flex-end; max-width: 180px;">
            <select id="plot-variables-mode-select" class="plot-select" style="padding: 2px 6px; font-size: 0.82em; width: 120px;">
                <!-- Populated dynamically -->
            </select>
            <button id="plot-variables-settings-btn" class="plot-btn" style="padding: 4px 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;" title="配置变量模块选项">
                <i class="fa-solid fa-gear"></i>
            </button>
        </div>
    </div>

    <!-- 2. Scrollable Variable Cards List Area -->
    <div class="plot-tab-content" id="plot-variables-card-container" style="flex: 1; overflow-y: auto; padding: 5px 0; display: flex; flex-direction: column; gap: 8px;">
        <!-- Dynamically rendered variable cards go here -->
    </div>

    <!-- 3. Bottom Controls -->
    <div style="border-top: 1px solid var(--SmartThemeBorderColor); padding-top: 10px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; gap: 10px;">
        <div style="display: flex; gap: 12px; align-items: center;">
            <button id="plot-variables-clear-all-btn" class="plot-btn" style="padding: 6px 8px; color: var(--SmartThemeQuoteColor); display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: none; background: none;" title="重置/清空所有变量">
                <i class="fa-solid fa-trash-can"></i>
            </button>
            <label style="display: flex; align-items: center; gap: 4px; font-size: 0.78em; opacity: 0.7; cursor: pointer; user-select: none;">
                <input type="checkbox" id="plot-variables-show-hidden-checkbox" style="margin: 0; width: 13px; height: 13px;"> 显示已隐藏变量
            </label>
        </div>
        <div style="display: flex; gap: 8px;">
            <button id="plot-variables-import-btn" class="plot-btn" style="padding: 6px 12px; border: none; background: none; color: var(--SmartThemeEmColor); display: flex; align-items: center; justify-content: center; flex-shrink: 0;" title="批量导入/粘贴解析变量">
                <i class="fa-solid fa-file-import"></i>
            </button>
            <button id="plot-variables-add-btn" class="plot-btn" style="padding: 6px 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;" title="手动添加新变量">
                <i class="fa-solid fa-plus"></i>
            </button>
        </div>
    </div>

    <!-- 4. Batch Import Modal -->
    <div id="plot-variables-import-modal" style="position: absolute; inset: 0; background-color: rgba(var(--SmartThemeBlurTintColor-rgb, 20,20,30), 0.95); z-index: 1020; display: none; flex-direction: column; padding: 14px; box-sizing: border-box; overflow-y: auto;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid var(--SmartThemeBorderColor); padding-bottom: 6px;">
            <span style="font-weight: bold; color: var(--SmartThemeEmColor); font-size: 0.95em;"><i class="fa-solid fa-file-import"></i> 批量解析并导入变量</span>
            <i class="fa-solid fa-xmark" id="plot-variables-import-close" style="cursor: pointer; font-size: 1.2em; padding: 4px;"></i>
        </div>
        <div style="display: flex; flex-direction: column; gap: 10px; flex: 1; min-height: 0;">
            <span style="font-size: 0.8em; opacity: 0.75; line-height: 1.4;">
                请在下方粘贴文本。支持 JSON 键值对，或者形如 <code>好感度 = 50</code>、<code>姓名: 提米</code> 等换行键值格式。系统将智能分析并匹配类型添加。
            </span>
            <textarea id="plot-variables-import-textarea" class="plot-input" style="flex: 1; font-family: monospace; font-size: 0.85em; width: 100%; min-height: 120px; box-sizing: border-box;" placeholder="示例：&#10;关系值: 50&#10;是否解锁据点: false&#10;位置: 咖啡馆"></textarea>
            
            <div id="plot-variables-import-preview-group" style="display: none; border: 1px solid var(--SmartThemeBorderColor); border-radius: 6px; padding: 8px; background: rgba(0,0,0,0.15); max-height: 150px; overflow-y: auto; flex-direction: column; gap: 4px;">
                <label style="font-size: 0.82em; font-weight: bold; color: var(--SmartThemeEmColor); margin-bottom: 4px;">解析预览：</label>
                <div id="plot-variables-import-preview-list" style="display: flex; flex-direction: column; gap: 4px; font-size: 0.8em;"></div>
            </div>

            <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; flex-shrink: 0;">
                <button id="plot-variables-import-btn-parse" class="plot-btn" style="padding: 6px 12px; background: none; border: 1px solid var(--SmartThemeBorderColor);">
                    <i class="fa-solid fa-magnifying-glass"></i> 开始解析
                </button>
                <button id="plot-variables-import-btn-save" class="plot-btn" style="padding: 6px 16px; display: none;">
                    <i class="fa-solid fa-floppy-disk"></i> 保存并添加
                </button>
            </div>
        </div>
    </div>

    <!-- 5. Detail Configuration Drawer -->
    <div class="plot-bts-drawer" id="plot-variable-config-drawer" style="position: absolute; inset: 0; background-color: rgba(var(--SmartThemeBlurTintColor-rgb, 20,20,30), 1); z-index: 100; display: none; flex-direction: column;">
        <!-- Drawer Header -->
        <div class="plot-bts-drawer-header" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; border-bottom: 1px solid var(--SmartThemeBorderColor); background-color: var(--SmartThemeChatTintColor); flex-shrink: 0;">
            <span class="plot-bts-drawer-title" style="font-weight: bold; color: var(--SmartThemeEmColor); font-size: 0.95em;"><i class="fa-solid fa-gear"></i> 配置变量与触发器</span>
            <i class="fa-solid fa-xmark" id="plot-variable-drawer-close" style="cursor: pointer; font-size: 1.3em; color: var(--SmartThemeEmColor); padding: 4px;"></i>
        </div>

        <!-- Drawer Body (Form) -->
        <div class="plot-bts-drawer-body" style="flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 14px; box-sizing: border-box;">
            <!-- ID & Name -->
            <div style="display: flex; gap: 10px; width: 100%;">
                <div class="plot-setting-group" style="flex: 1;">
                    <label class="plot-label">变量标识 (ID/Key)</label>
                    <input type="text" id="plot-drawer-var-id" class="plot-input" placeholder="例如 relationship (英文/拼音)" style="width: 100%;">
                </div>
                <div class="plot-setting-group" style="flex: 1;">
                    <label class="plot-label">友好显示名称</label>
                    <input type="text" id="plot-drawer-var-name" class="plot-input" placeholder="例如 好感度" style="width: 100%;">
                </div>
            </div>

            <!-- Type & Default -->
            <div style="display: flex; gap: 10px; width: 100%;">
                <div class="plot-setting-group" style="flex: 1;">
                    <label class="plot-label">数据类型</label>
                    <select id="plot-drawer-var-type" class="plot-select" style="width: 100%;">
                        <option value="number">数值型 (Number)</option>
                        <option value="boolean">布尔型 (Boolean)</option>
                        <option value="text">文本型 (Text)</option>
                        <option value="enum">枚举型 (Enum)</option>
                        <option value="json">复杂 JSON (Object/Array)</option>
                    </select>
                </div>
                <div class="plot-setting-group" style="flex: 1;">
                    <label class="plot-label">初始/默认值</label>
                    <div id="plot-drawer-var-default-container" style="width: 100%;">
                        <!-- Dynamically replaced by script according to type selection -->
                        <input type="text" id="plot-drawer-var-default" class="plot-input" style="width: 100%;">
                    </div>
                </div>
            </div>

            <!-- Min/Max (Number only) -->
            <div id="plot-drawer-var-limits-group" style="display: flex; gap: 10px; width: 100%;">
                <div class="plot-setting-group" style="flex: 1;">
                    <label class="plot-label">最小值 (Min)</label>
                    <input type="number" id="plot-drawer-var-min" class="plot-input" style="width: 100%;">
                </div>
                <div class="plot-setting-group" style="flex: 1;">
                    <label class="plot-label">最大值 (Max)</label>
                    <input type="number" id="plot-drawer-var-max" class="plot-input" style="width: 100%;">
                </div>
            </div>

            <!-- Choices (Enum only) -->
            <div class="plot-setting-group" id="plot-drawer-var-choices-group" style="display: none;">
                <label class="plot-label">枚举选项 (逗号分隔)</label>
                <input type="text" id="plot-drawer-var-choices" class="plot-input" placeholder="例如: 初识, 熟稔, 挚友" style="width: 100%;">
            </div>

            <div class="plot-setting-group">
                <label class="plot-label">变量描述</label>
                <textarea id="plot-drawer-var-desc" class="plot-input" rows="2" style="width: 100%; resize: vertical; font-size: 0.9em;"></textarea>
            </div>

            <!-- Triggers Manager -->
            <div style="border: 1px solid var(--SmartThemeBorderColor); border-radius: 6px; padding: 10px; background: rgba(0,0,0,0.15); display: flex; flex-direction: column; gap: 8px;">
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 4px; margin-bottom: 4px;">
                    <label class="plot-label" style="color: var(--SmartThemeEmColor); margin: 0;"><i class="fa-solid fa-bolt"></i> 联动触发器 (Triggers)</label>
                    <button id="plot-drawer-add-trigger-btn" class="menu_button plot-btn" style="padding: 1px 6px; font-size: 0.72em; display: flex; align-items: center; gap: 3px;"><i class="fa-solid fa-plus"></i> 添加触发器</button>
                </div>
                
                <div id="plot-drawer-trigger-list" style="display: flex; flex-direction: column; gap: 10px;">
                    <!-- Variable triggers go here -->
                </div>
            </div>
        </div>

        <!-- Drawer Footer -->
        <div class="plot-bts-drawer-footer" style="padding: 10px 14px; border-top: 1px solid var(--SmartThemeBorderColor); background-color: var(--SmartThemeChatTintColor); display: flex; justify-content: flex-end; gap: 10px; flex-shrink: 0;">
            <button id="plot-variable-config-cancel" class="plot-btn" style="padding: 6px 14px; background: none; border: 1px solid var(--SmartThemeBorderColor);">取消</button>
            <button id="plot-variable-config-save" class="plot-btn" style="padding: 6px 18px;">保存</button>
        </div>
    </div>

    <!-- 6. JSON Editor Modal -->
    <div id="plot-variables-json-modal" style="position: absolute; inset: 0; background-color: rgba(var(--SmartThemeBlurTintColor-rgb, 20,20,30), 0.95); z-index: 1030; display: none; flex-direction: column; padding: 14px; box-sizing: border-box;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid var(--SmartThemeBorderColor); padding-bottom: 6px; flex-shrink: 0;">
            <span id="plot-json-modal-title" style="font-weight: bold; color: var(--SmartThemeEmColor); font-size: 0.95em;"><i class="fa-solid fa-code"></i> 编辑 JSON 变量</span>
            <i class="fa-solid fa-xmark" id="plot-variables-json-close" style="cursor: pointer; font-size: 1.2em; padding: 4px;"></i>
        </div>
        
        <!-- Tab Bar inside Modal -->
        <div class="plot-sub-tab-bar" id="plot-json-tabs" style="display: flex !important; margin-bottom: 10px; border-bottom: 1px solid var(--SmartThemeBorderColor) !important; padding-bottom: 0; flex-shrink: 0; gap: 6px;">
            <button class="plot-sub-tab active" data-jsontab="visual" style="font-size: 0.82em; padding: 4px 10px; font-weight: bold; background: none; border: 1px solid var(--SmartThemeBorderColor); border-radius: 4px;"><i class="fa-solid fa-folder-tree"></i> 可视化编辑</button>
            <button class="plot-sub-tab" data-jsontab="raw" style="font-size: 0.82em; padding: 4px 10px; font-weight: bold; background: none; border: 1px solid var(--SmartThemeBorderColor); border-radius: 4px; margin-left: 6px !important;"><i class="fa-solid fa-file-code"></i> 源码编辑</button>
        </div>

        <input type="hidden" id="plot-json-target-var-id">

        <!-- Tab Content: Visual Tree -->
        <div class="plot-json-tab-pane active" id="plot-json-pane-visual" style="flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; flex-shrink: 0;">
                <span style="font-size: 0.8em; opacity: 0.75;">可视化键值树：</span>
                <button id="plot-json-visual-add-btn" class="plot-btn" style="font-size: 0.75em; padding: 2px 8px; display: flex; align-items: center; gap: 3px;"><i class="fa-solid fa-plus"></i> 添加字段</button>
            </div>
            <div id="plot-json-visual-tree-container" style="display: flex; flex-direction: column; gap: 6px; border: 1px solid var(--SmartThemeBorderColor); border-radius: 6px; padding: 10px; background: rgba(0,0,0,0.15); flex: 1; overflow-y: auto;">
                <!-- Dynamically rendered visual nodes -->
            </div>
        </div>

        <!-- Tab Content: Raw Code -->
        <div class="plot-json-tab-pane" id="plot-json-pane-raw" style="flex: 1; display: none; flex-direction: column; gap: 8px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; flex-shrink: 0;">
                <span style="font-size: 0.8em; opacity: 0.75;">Raw JSON 字符串：</span>
                <span id="plot-json-raw-error-msg" style="color: var(--SmartThemeQuoteColor); font-size: 0.85em; font-weight: bold; display: none;"></span>
            </div>
            <textarea id="plot-json-raw-textarea" class="plot-input" style="flex: 1; font-family: monospace; font-size: 0.85em; width: 100%; box-sizing: border-box; resize: none;" placeholder="[&#10;  { &quot;name&quot;: &quot;金币&quot;, &quot;count&quot;: 10 }&#10;]"></textarea>
        </div>

        <!-- Footer -->
        <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 12px; flex-shrink: 0; border-top: 1px solid var(--SmartThemeBorderColor); padding-top: 10px;">
            <button id="plot-json-modal-cancel" class="plot-btn" style="padding: 6px 14px; background: none; border: 1px solid var(--SmartThemeBorderColor);">取消</button>
            <button id="plot-json-modal-save" class="plot-btn" style="padding: 6px 18px;"><i class="fa-solid fa-floppy-disk"></i> 确认修改</button>
        </div>
    </div>
</div>
